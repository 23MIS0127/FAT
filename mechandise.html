<!DOCTYPE html>
<html>
<head>
    <title>Merchandise Store</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: space-around;
            margin: 20px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 10px gray;
        }

        .product img {
            width: 100%;
            height: 150px;
        }

        button {
            background-color: #28a745;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>My Merchandise Store</h1>
    <p>Buy Cool Stuff 😎</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/150" alt="T-shirt">
        <h3>T-Shirt</h3>
        <p>₹499</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150" alt="Hoodie">
        <h3>Hoodie</h3>
        <p>₹999</p>
        <button>Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150" alt="Cap">
        <h3>Cap</h3>
        <p>₹299</p>
        <button>Add to Cart</button>
    </div>

</div>

<footer>
    <p>© 2026 Merchandise Store</p>
</footer>

</body>
</html>
